name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0, 0.1.1-dev.20260627.1, or 0.1.1-nightly.20260627.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64 Installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $raw = "${{ github.event.inputs.version }}"
          } else {
            $raw = "${{ github.ref_name }}"
          }

          $version = $raw.Trim()
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$') {
            throw "Invalid release version: $raw"
          }

          if ($version -match '-dev\.\d{8}\.\d+$') {
            $channel = "dev"
          } elseif ($version -match '-nightly\.\d{8}\.\d+$') {
            $channel = "nightly"
          } else {
            $channel = "stable"
          }

          $prerelease = if ($channel -eq "stable" -and $version -notmatch '[.-](alpha|beta|rc|dev|nightly|preview|test)\b') { "false" } else { "true" }
          $releaseName = switch ($channel) {
            "dev" { "KamiCode Dev v$version" }
            "nightly" { "KamiCode Nightly v$version" }
            default { "KamiCode v$version" }
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Align package versions
        run: node scripts/update-release-package-versions.ts "${{ steps.version.outputs.version }}"

      - name: Install Spectre-mitigated MSVC libs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -products * -latest -property installationPath
          if ([string]::IsNullOrWhiteSpace($installPath)) {
            Write-Host "Visual Studio installation not found through vswhere; skipping optional Spectre component install."
            exit 0
          }

          $setupExe = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $proc = Start-Process -FilePath $setupExe `
            -ArgumentList "modify", "--installPath", "`"$installPath`"", "--add", `
            "Microsoft.VisualStudio.Component.VC.Tools.x86.x64.Spectre", "--quiet", "--norestart" `
            -Wait -PassThru -NoNewWindow

          if ($null -eq $proc -or $proc.ExitCode -ne 0) {
            $code = if ($null -ne $proc) { $proc.ExitCode } else { 1 }
            Write-Error "Visual Studio Installer failed with exit code $code"
            exit $code
          }

      - name: Build Windows installer
        env:
          T3CODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
          T3CODE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.T3CODE_GITHUB_OAUTH_CLIENT_ID }}
          T3CODE_DESKTOP_SIGNED: ${{ vars.T3CODE_DESKTOP_SIGNED || 'false' }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME || 'Camie Tech' }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
        run: |
          node scripts/build-desktop-artifact.ts `
            --platform win `
            --target nsis `
            --arch x64 `
            --build-version "${{ steps.version.outputs.version }}" `
            --verbose

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          make_latest: ${{ steps.version.outputs.prerelease == 'false' }}
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/*.yml
          fail_on_unmatched_files: true
